services:
  gloci:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gloci
    ports:
      - "8080:8080"
    environment:
      GLOCI_PORT: "8080"
      GLOCI_DATA_FILE: "/data/state.json"
    volumes:
      - gloci_data:/data
    restart: unless-stopped

volumes:
  gloci_data:
